openapi: 3.0.0
info:
  title: "API Clairie Bleu"
  description: "Voila la doc du BACKEND, toutes les requetes necessaires pour pouvoir exploiter le projet"
  version: 1.0.0

servers:
  - url: http://localhost:8085/php
    description: Serveur Local de dev

tags:
  - name:  Authentification
    description: "Connexion et déconnexion des utilisateurs"
  - name:  Familles
    description: "Gestion des comptes familles et de leurs données"
  - name:  Emplacements
    description: "Gestion des terrains du camping"
  - name:  Activités
    description: "Gestion du catalogue des activités proposées"
  - name:  Réservations & Attente
    description: "Gestion des inscriptions, désinscriptions et de la file d'attente (FIFO)"
  - name:  Utilisateurs
    description: "Gestion des sous-profils liés à une famille"

# 1. Définition des chemins (Routes)
paths:

#ADMIN

#/admin/famillies :
  /admin/familles/NbMembre/{id_famille}:
      get:
        summary: "Récupère le Nombre de membre d'une famille via son id"
        tags: 
          - Familles
        parameters:
          - name: id
            in: path
            required: true
            schema:
              type: integer
        responses:
          '200':
            description: "Nombre de membre avec succès"
            content:
              application/json:
                schema:
                  type : integer
                  example : 5
  /admin/familles/delete/{id_famille}:
      delete:
        summary: "Supprimer famille grâce à son id"
        tags:
          - Familles
        parameters:
          - name: id_famille
            in: path
            required: true
            schema:
              type: integer
        responses:
          '200':
            description: "Famille supprimé avec succès"
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Success'
          '400' :
            description : "Erreur lors de la suppression"
            content: 
              application/json:
                schema :
                  $ref: '#/components/schemas/Error'
  /admin/familles/withPayeur:
      get:
        summary: "Recup les familles avec les infos du payeur"
        tags:
          - Familles
        responses:
          '200':
            description: "Données récupéré avec succès"
            content:
              application/json:
                schema:
                  type: object
                  properties:
                      id_famille : {type : integer ,example : 4}
                      mail : {type : string ,example : mail@mail.fr}
                      adresse : {type : string ,example : 260 route du chemin}
                      telephone : {type : integer ,example : 0707070707}
                      payeur_id : {type : integer ,example : 4}
                      ville : {type : string ,example : "Areches"}
                      nom : {type : string ,example : "Gaborit"}
                      prenom : {type : string ,example : Mael}
                      date_naissance : {type : string ,example : "2006-07-14"}
                      user_id : {type : integer ,example : 4}
  /admin/familles/create:
      post:
        summary: "Ajoute une famille"
        tags:
        - Familles
        requestBody:
            required: true
            content:
              application/json:
                schema:
                  
                  $ref: '#/components/schemas/createFamille'
                  # type: object
                    
        responses:
          '200':
            description: "Famille ajouté avec succès"
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Success'
  /admin/familles/{id_famille}:
      get:
        summary: "Récupère la famille selon son id"
        tags:
          - Familles
        parameters:
          - name: id_famille
            in: path
            required: true
            schema:
              type: integer
        responses:
          '200':
            description: "Famille récupéré avec succès"
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Familles'
  /admin/familles:
    get:
      summary: "Récupération de toute les familles"
      tags:
        - Familles
      security:
        - bearerAuth: []
      responses:
        '200':
          description: "Familles récupérés avec succès"
          content:
            application/json:
              schema:
                type: object
                properties:
                    id_famille : {type : integer ,example : 4}
                    mail : {type : string ,example : "mail@mail.fr"}
                    password : {type: string, example: "As48d63"}
                    adresse : {type : string ,example : "260 route du chemin"}
                    telephone : {type : integer ,example : 0707070707}
                    code_postal : {type : integer ,example : 73100}
                    id_payeur : {type: integer, example : 119 }
                    ville : {type : string ,example : "Areches"}
                   



#/admin/users

  /admin/users/{id_user}:
      get:
        summary: "Récupère l'utilisateur selon son id"
        tags:
          - Utilisateurs
        parameters:
          - name: id_user
            in: path
            required: true
            schema:
              type: integer
        responses:
          '200':
            description: "Utilisateur récupéré avec succès"
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Users'
  /admin/users:
    get:
      summary: "Recupération Utilisateur"
      tags:
        - Utilisateurs
      responses:
        '200':
          description: "Utilisateur récupéré avec succès"
          content:
            application/json:
              schema:
                type: object
                properties:
                    id : {type : integer ,example : 4}
                    nom : {type : string ,example : "Mollet"}
                    prenom : {type: string, example: "Enzo"}
                    date_naissance : {type : string ,example : "10/12/2006"}
                    id_famille : {type : integer ,example : 66}

#/admin/activites
  /admin/activites/fifo/delete/{id}:
    delete:
      summary: "Refuser (supprimer) une demande de la file d'attente"
      tags:
        - Réservations & Attente
      parameters:
        - name: id
          in: path
          required: true
          description: "L'ID de l'attente (id_attente) à supprimer"
          schema:
            type: integer
      responses:
        '200':
          description: "Opération traitée par le serveur"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: 
                    type: string
                    example: "success"
                  msg: 
                    type: string
                    example: "Entrée supprimée de la file d'attente"
  /admin/activites/fifo/accept:
      post:
        summary: "Accept File attente"
        tags:
        - Réservations & Attente
        requestBody:
            required: true
            content:
              application/json:
                schema:     
                    type: object               
                    properties :
                      id_famille : {type : integer ,example : 4}
                      id_activite : {type : integer ,example : 4}
                      nb_membre : {type : integer ,example : 4}
                      id_attente : {type : integer ,example : 4}
        responses:
          '200':
            description: "Demande de la file d'attente acceptée avec succès"
            content:
              application/json:
                schema:
                  type: object
                  properties :
                    msg : {type : string ,example : impossible de supprimer l'élément de la file d'attente}
                    mskg : {type : string ,example : impossible de supprimer l'élément de la file d'attente}
# /admin/activites/fifo/add :






  /admin/activites/fifo:
      get:
        summary: "Supprimer famille grâce à son id"
        tags:
        - Réservations & Attente
        responses:
          '200':
            description: "Données chargées avec succès"
            content:
              application/json:
                schema:
                  type: object
                  properties :
                    id_famille : {type : integer,example : 66}
                    id_activite : {type : integer ,example : 47}
                    id_attente : {type : integer ,example : 39}
                    nom_activite : {type : integer ,example : "AquaSplash"}
                    prix: {type : integer ,example : 47}
                    cap_act : {type : integer ,example : 47}
                    date_inscription : {type : string ,example : "2026-04-21 13:14:38"}
                    nb_membre : {type : integer ,example : 10}
                    id_payeur : {type : integer ,example : 10}
                    nom_payeur : {type : string ,example : "Gaborit"}
                    prenom_payeur : {type : string ,example : Mael}  
  /admin/activites/reservations/delete/{id}:
    delete:
      summary: "Supprime une réservation d'activité via son id"
      tags: 
        - Réservations & Attente
      parameters:
        - name: id
          in: path
          required: true
          description: "L'ID de la réservation à supprimer"
          schema:
            type: integer
      responses:
        '200':
          description: "Réservation supprimée avec succès"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success' 
# /admin/activites/reservations/add:




  /admin/activites/reservations/{id_reservation_activite}:
      get:
        summary: "Récupère une réservation d'activité via son id"
        tags :
          - Réservations & Attente
        parameters:
          - name: id
            in: path
            required: true
            schema:
              type: integer
        responses:
          '200':
            description: "Réservation d'activité récupéré avec succès"
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ReservationActivite'
  /admin/activites/reservations:
      get:
        summary: "Récupère les réservations pour une activité"
        tags:
          - Réservations & Attente
        responses:
          '200':
            description: "Réservation d'activité récupéré avec succès"
            content:
              application/json:
                schema:
                  type: object
                  properties :
                    id_famille : {type : integer,example : 67}
                    id_activite : {type : integer ,example : 47}
                    id_reservation_activite : {type : integer ,example : 234}
                    nb_membre : {type : integer ,example : 10}
  /admin/activites/participants/{id}:
    get :
      summary : "récupère un participant via son id"
      tags:
      - Réservations & Attente
      parameters :
      - name : id
        in : path
        required: true
        description: "L'ID du participant à récupérer"
        schema:
          type: integer
      responses:
        '200':
          description: "Echec de la récupération"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '400':
            description: "Echec de la récupération"
            content : 
              application/json:
                schema:
                  $ref: '#/components/schemas/Error'
  /admin/activites/delete/{id_activite}:
      delete:
        summary: "Supprime l'activité grace à son id"
        tags:
          - Activités
        parameters:
          - name: id_activite
            in: path
            required: true
            schema:
              type: integer
        responses:
          '200':
            description: "Activité supprimé avec succès"
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Success'
          '400':
            description: "Erreur de l'opération"
            content : 
              application/json:
                schema:
                  $ref: '#/components/schemas/Error'
  /admin/activites/add:
      post:
        summary: "Ajoute une réservation à une activité"
        tags:
        - Réservations & Attente
        requestBody:
            required: true
            content:
              application/json:
                schema:   
                    type: object                 
                    properties :
                      id_famille : {type : integer ,example : 4}
                      id_activite : {type : integer ,example : 4}
                      nb_membre : {type : integer ,example : 4}
        responses:
          '200':
            description: "Réservation ajoutée avec succès"
            content:
              application/json:
                schema:
                  type: object
                  properties :
                    status : {type : string,example : success}
                    msg : {type : string ,example : Reservation AQJOUTE}
  /admin/activites/{id_activite}:
      get:
        summary: "Récupère l'activité selon son id"
        tags:
          - Activités
        parameters:
          - name: id_activite
            in: path
            required: true
            schema:
              type: integer
        responses:
          '200':
            description: "Activité récupéré avec succès"
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Activites'
  /admin/activites:
    get:
      summary: "Récupération de toute les activites"
      tags:
        - Activités
      security:
        - bearerAuth: []
      responses:
        '200':
          description: "Activités récupérés avec succès"
          content:
            application/json:
              schema:
                type: object
                properties:
                    prix : {type : integer ,example : 4}
                    date_d : {type : string ,example : "2026-04-03 08:17:40"}
                    date_f : {type : string ,example : "2026-04-03 10:17:40"}
                    id : {type : integer ,example : 3}
                    nom : {type : string ,example : "Paintball"}
                    cap_act : {type: integer, example: "18"}
                    description : {type : string ,example : "Venez vous faire allumer au paintball"}
                    lieu : {type : string ,example : "lac d'Aiguebelette"}

