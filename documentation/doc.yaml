          example : Gaborit
        prenom :
          type : string
          example : Mael
        date_naissance : 
          type : string
          format : date
          example : "20006-07-14"
        id_famille : 
          type : integer
          example : 66



    Success : 
      properties : 
        status :
          type : string
          example : success
        msg : 
          type : string
          example : success




    Error : 
      properties : 
        status : 
          type : string
          example : error
        msg :
          type : string
          example : error



    Participant:
      properties:
        id_activite : 
          type : integer
          example : 47 
        nb_membre : 
          type : integer
          example : 10
        id_famille : 
          type : integer
          example : 67
        nom_payeur : 
          type : string
          example : Gaborit
        prenom_payeur : 
          type : string
          example : Telio



    ReservationActivite : 
      type : object
      properties:
        id_famille: { type: integer, example: 67 }
        id_activite: { type: integer, example: 47 }
        nb_membre: { type: integer, example: 10 }
        id_reservation_activite: { type: integer, example: 234 }
    createFamille : 
      type : object
      properties:
        nom: { type: string, example: Gaborit }
        prenom: { type: string, example: Mael }
        date_n: { type: string, example: "2006-07-14"}
        mail: { type: string, example: mail@mail.fr }
        tel: { type: integer, example: 0707070707 }
        adresse: { type: string, example: 260 route du chemin }
        ville: { type: string, example: Areches }
        code_postal: { type: integer, example: 7270 }
        password: { type: string, example: mdpCrypte }



