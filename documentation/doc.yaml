openapi: 3.0.0
info:
  title: "API Clairie Bleu"
  description: "Voila la doc du BACKEND, toutes les requetes necessaires pour pouvoir exploiter le projet"
  version: 1.0.0

servers:
  - url: http://localhost:8085/php
    description: Serveur Local de dev

tags:
  - name:  Authentification
    description: "Connexion et déconnexion des utilisateurs"
  - name:  Familles
    description: "Gestion des comptes familles et de leurs données"
  - name:  Emplacements
    description: "Gestion des terrains du camping"
  - name:  Activités
    description: "Gestion du catalogue des activités proposées"
  - name:  Réservations & Attente
    description: "Gestion des inscriptions, désinscriptions et de la file d'attente (FIFO)"
  - name:  Utilisateurs
    description: "Gestion des sous-profils liés à une famille"
  - name: Equipe technique
    description : "Gestion de l'équipe technique"
  - name: Message
    description : "Gestion des messages"

# 1. Définition des chemins (Routes)
paths:

#ADMIN

#/admin/famillies :
  /admin/familles/NbMembre/{id_famille}:
      get:
        summary: "Récupère le Nombre de membre d'une famille via son id"
        tags: 
          - Familles
        parameters:
          - name: id_famille
            in: path
            required: true
            schema:
              type: integer
        responses:
          '200':
            description: "Nombre de membre avec succès"
            content:
              application/json:
                schema:
                  type : integer
                  example : 5
  /admin/familles/membre/add:
      put:
        summary: "Ajoute un membre à une famille"
        tags:
        - Familles
        requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    nom : {type: string, example: "MOLLET"}
                    prenom : {type : string ,example : "Enzo" }
                    date_naissance : {type : string ,example : "2005-10-27" }
                    id_famille : {type : integer ,example : 73}

        responses:
          '200':
            description: "Famille ajouté avec succès"
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Success'

  /admin/familles/membre/delete:
       delete:
        summary: "Supprimer un utilisateur grâce à son id"
        tags:
          - Utilisateur
        parameters:
          - name: id_famille
            in: path
            required: true
            schema:
              type: integer
        responses:
          '200':
            description: "Famille supprimé avec succès"
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Success'
          '400' :
            description : "Erreur lors de la suppression"
            content: 
              application/json:
                schema :
                  $ref: '#/components/schemas/Error'

  /admin/familles/membre/{id_famille}:
      get:
        summary: "Récupère les membre d'une famille via son id"
        tags: 
          - Familles
        parameters:
          - name: id_famille
            in: path
            required: true
            schema:
              type: integer
        responses:
          '200':
            description: "Famille avec succès"
            content:
              application/json:
                schema:
                  type : integer
                  example : 5

  /admin/familles/delete/{id_famille}:
      delete:
        summary: "Supprimer famille grâce à son id"
        tags:
          - Familles
        parameters:
          - name: id_famille
            in: path
            required: true
            schema:
              type: integer
        responses:
          '200':
            description: "Famille supprimé avec succès"
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Success'
          '400' :
            description : "Erreur lors de la suppression"
            content: 
              application/json:
                schema :
                  $ref: '#/components/schemas/Error'

  /admin/familles/withPayeur:
      get:
        summary: "Recup les familles avec les infos du payeur"
        tags:
          - Familles
        responses:
          '200':
            description: "Données récupéré avec succès"
            content:
              application/json:
                schema:
                  type: object
                  properties:
                      id_famille : {type : integer ,example : 4}
                      mail : {type : string ,example : mail@mail.fr}
                      adresse : {type : string ,example : 260 route du chemin}
                      telephone : {type : integer ,example : 0707070707}
                      payeur_id : {type : integer ,example : 4}
                      ville : {type : string ,example : "Areches"}
                      nom : {type : string ,example : "Gaborit"}
                      prenom : {type : string ,example : Mael}
                      date_naissance : {type : string ,example : "2006-07-14"}
                      user_id : {type : integer ,example : 4}
  /admin/familles/create:
      post:
        summary: "Ajoute une famille"
        tags:
        - Familles
        requestBody:
            required: true
            content:
              application/json:
                schema:
                  
                  $ref: '#/components/schemas/createFamille'
                  # type: object              
        responses:
          '200':
            description: "Famille ajouté avec succès"
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Success'

  /admin/familles/{id_famille}:
      get:
        summary: "Récupère la famille selon son id"
        tags:
          - Familles
        parameters:
          - name: id_famille
            in: path
            required: true
            schema:
              type: integer
        responses:
          '200':
            description: "Famille récupéré avec succès"
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    id_famille : {type : integer ,example : 67}
                    mail : {type : string ,example : "mail@mail.com"}
                    password : {type : string ,example : "$2y$10$7GQO.zYhmjdvgJETj8GMiulheX3LFdQdrlkzIkDKdMXcnSTX8Z2Nq"}
                    adresse : {type : string ,example : "168 rue des palntees"}
                    telephonne : {type : integer ,example : 0707070707}
                    code_postal : {type: integer, example: 73100}
                    id_payeur : {type : integer ,example : 112 }
                    ville : {type : string ,example : "Aiguebelette"}
  /admin/familles:
    get:
      summary: "Récupération de toute les familles"
      tags:
        - Familles
      security:
        - bearerAuth: []
      responses:
        '200':
          description: "Familles récupérés avec succès"
          content:
            application/json:
              schema:
                type: object
                properties:
                    id_famille : {type : integer ,example : 4}
                    mail : {type : string ,example : "mail@mail.fr"}
                    password : {type: string, example: "As48d63"}
                    adresse : {type : string ,example : "260 route du chemin"}
                    telephone : {type : integer ,example : 0707070707}
                    code_postal : {type : integer ,example : 73100}
                    id_payeur : {type: integer, example : 119 }
                    ville : {type : string ,example : "Areches"}
                   



#/admin/users

  /admin/users/{id_user}:
      get:
        summary: "Récupère l'utilisateur selon son id"
        tags:
          - Utilisateurs
        parameters:
          - name: id_user
            in: path
            description : "l'id de l'utilisateur à récupérer"
            required: true
            schema:
              type: integer
        responses:
          '200':
            description: "Utilisateur récupéré avec succès"
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    id : {type : integer ,example : 67}
                    nom : {type : string ,example : "Jacquet"}
                    prenom : {type : string ,example : "Quentin"}
                    date_naissance : {type : string ,example : "2006-10-25"}
                    id_famille : {type : integer ,example : 67}
  /admin/users:
    get:
      summary: "Recupération Utilisateur"
      tags:
        - Utilisateurs
      responses:
        '200':
          description: "Utilisateur récupéré avec succès"
          content:
            application/json:
              schema:
                type: object
                properties:
                    id : {type : integer ,example : 4}
                    nom : {type : string ,example : "Mollet"}
                    prenom : {type: string, example: "Enzo"}
                    date_naissance : {type : string ,example : "10/12/2006"}
                    id_famille : {type : integer ,example : 66}

#/admin/activites
  /admin/activites/fifo/delete/{id}:
    delete:
      summary: "Refuser (supprimer) une demande de la file d'attente"
      tags:
        - Réservations & Attente
      parameters:
        - name: id
          in: path
          required: true
          description: "L'ID de l'attente (id_attente) à supprimer"
          schema:
            type: integer
      responses:
          '200':
            description: "Demande supprimé de la file d'attente avec succès"
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Success'
          '400' :
            description : "Erreur lors de la suppression"
            content: 
              application/json:
                schema :
                  $ref: '#/components/schemas/Error'
  /admin/activites/fifo/accept:
      post:
        summary: "Accept File attente"
        tags:
        - Réservations & Attente
        requestBody:
            required: true
            content:
              application/json:
                schema:     
                    type: object               
                    properties :
                      id_famille : {type : integer ,example : 4}
                      id_activite : {type : integer ,example : 4}
                      nb_membre : {type : integer ,example : 4}
                      id_attente : {type : integer ,example : 4}
        responses:
          '200':
            description: "Demande de la file d'attente acceptée avec succès"
            content:
              application/json:
                schema:
                  type: object
                  properties :
                    msg : {type : string ,example : Demande de la file d'attente acceptée avec succès}

  /admin/activites/fifo/add :
    post :
      summary : "Ajoute une famille à la File attente"
      tags:
        - Réservations & Attente
      requestBody:
            required: true
            content:
              application/json:
                schema:     
                    type: object               
                    properties :
                      id_famille : {type : integer ,example : 4}
                      id_activite : {type : integer ,example : 4}
                      nb_membre : {type : integer ,example : 4}
      responses:
          '200':
            description: "Ajout à la file d'attente réalisé avec succès"
            content:
              application/json:
                schema:
                  type: object
                  properties :
                    msg : {type : string ,example : "Ajout à la file d'attente réalisé avec succès"}

  /admin/activites/fifo/update/{id_attente} :
    post :
      summary : "Modifie le nombre de membre d'une famille inscrit à la File attente"
      tags:
        - Réservations & Attente
      requestBody:
            required: true
            content:
              application/json:
                schema:     
                    type: object               
                    properties :
                      signe : {type : string ,example : "-"}
                      nb_membre_aj : {type : integer ,example : 4}
                      
      responses:
          '200':
            description: "Nombre de membre sur la file d'attente modifié avec succès"
            content:
              application/json:
                schema:
                  type: object
                  properties :
                    msg : {type : string ,example : "Nombre de membre sur la file d'attente modifié avec succès"}

  /admin/activites/fifo:
      get:
        summary: "Récupère toutes infos des files d'attente d'activités "
        tags:
        - Réservations & Attente
        responses:
          '200':
            description: "Données récupéré avec avec succès"
            content:
              application/json:
                schema:
                  type: object
                  properties :
                    id_famille : {type : integer,example : 66}
                    id_activite : {type : integer ,example : 47}
                    id_attente : {type : integer ,example : 39}
                    nom_activite : {type : integer ,example : "AquaSplash"}
                    prix: {type : integer ,example : 47}
                    cap_act : {type : integer ,example : 47}
                    date_inscription : {type : string ,example : "2026-04-21 13:14:38"}
                    nb_membre : {type : integer ,example : 10}
                    id_payeur : {type : integer ,example : 10}
                    nom_payeur : {type : string ,example : "Gaborit"}
                    prenom_payeur : {type : string ,example : Mael}  
  /admin/activites/reservations/delete/{id}:
    delete:
      summary: "Supprime une réservation d'activité via son id"
      tags: 
        - Réservations & Attente
      parameters:
        - name: id
          in: path
          required: true
          description: "Le nombre de membres à ajouter (ex: 2) ou à retirer (ex: -1)"
          schema:
            type: integer
      responses:
          '200':
            description: "Réservation supprimé avec succès"
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Success'
          '400' :
            description : "Erreur lors de la suppression"
            content: 
              application/json:
                schema :
                  $ref: '#/components/schemas/Error'

  /admin/activites/reservations/add:  
    post :
      summary : "Ajoute une réservation à une activité"
      tags:
        - Réservations & Attente
      requestBody:
            required: true
            content:
              application/json:
                schema:     
                    type: object               
                    properties :
                      id_famille : {type : integer ,example : 4}
                      id_activite : {type : integer ,example : 4}
                      nb_membre : {type : integer ,example : 4}
      responses:
          '200':
            description: "Ajout de la réservation réalisé avec succès"
            content:
              application/json:
                schema:
                  type: object
                  properties :
                    msg : {type : string ,example : "Ajout de la réservation réalisé avec succès"}

  /admin/activites/reservations/updateCapResa/{id} :  
    post :
      summary : "modifier le nombre de personnes d'une famille déjà inscrites à une activité"
      tags:
        - Réservations & Attente
      requestBody:
            required: true
            content:
              application/json:
                schema:     
                    type: object               
                    properties :
                      id_famille : {type : integer ,example : 4}
                      id_activite : {type : integer ,example : 4}
      responses:
          '200':
            description: "Ajout de la réservation réalisé avec succès"
            content:
              application/json:
                schema:
                  type: object
                  properties :
                    msg : {type : string ,example : "Ajout de la réservation réalisé avec succès"}


  /admin/activites/reservations/{id_reservation_activite}:
      get:
        summary: "Récupère une réservation d'activité via son id"
        tags :
          - Réservations & Attente
        parameters:
          - name: id_reservation_activite
            in: path
            required: true
            schema:
              type: integer
        responses:
          '200':
            description: "Réservation d'activité récupéré avec succès"
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    id_famille : {type : integer ,example : 67}
                    id_activite : {type : integer ,example : 67}
                    id_reservation_activite : {type : integer ,example : 3}
                    nb_membre : {type : integer ,example : 3}
  /admin/activites/reservations:
      get:
        summary: "Récupère les réservations pour une activité"
        tags:
          - Réservations & Attente
        responses:
          '200':
            description: "Réservation d'activité récupéré avec succès"
            content:
              application/json:
                schema:
                  type: object
                  properties :
                    id_famille : {type : integer,example : 67}
                    id_activite : {type : integer ,example : 47}
                    id_reservation_activite : {type : integer ,example : 234}
                    nb_membre : {type : integer ,example : 10}
  /admin/activites/participants/{id_activite}:
    get :
      summary : "Liste des familles participantes et de leur payeur pour une activité donnée."
      tags:
      - Réservations & Attente
      parameters :
      - name : id_activite
        in : path
        required: true
        description: "L'ID de l'activité à récupérer"
        schema:
          type: integer
      responses:
        '200':
          description: "Donnée récupéré avec succès"
          content:
            application/json:
              schema:
                type: object
                properties:
                    id_activite : {type : integer ,example : 66}
                    nb_membre : {type : integer ,example : 3}
                    nom_payeur : {type : string ,example : "MOLLET"}
                    prenom_payeur : {type : string ,example : "Enzo"}

        '400':
            description: "Echec de la récupération"
            content : 
              application/json:
                schema:
                  $ref: '#/components/schemas/Error'
  /admin/activites/delete/{id_activite}:
      delete:
        summary: "Supprime l'activité grace à son id"
        tags:
          - Activités
        parameters:
          - name: id_activite
            in: path
            required: true
            schema:
              type: integer
        responses:
          '200':
            description: "Activité supprimé avec succès"
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Success'
          '400':
            description: "Erreur de l'opération"
            content : 
              application/json:
                schema:
                  $ref: '#/components/schemas/Error'
  /admin/activites/participants/update:
    post :
      summary : "Met à jour une activité"
      tags:
        - Réservations & Attente
      requestBody:
            required: true
            content:
              application/json:
                schema:     
                    type: object               
                    properties :
                      nom : {type : string ,example : "barbecue"}
                      prix : {type : integer ,example : 25}
                      date_f : {type : string ,example : 4}
                      date_d : {type : integer ,example : 4}
                      description : {type : integer ,example : 4}
                      lieu : {type : integer ,example : 4}
                      id : {type : integer ,example : 4}
                      cap_act : {type : integer ,example : 4}
                      id_animateur : {type : integer ,example : 4}
      responses:
          '200':
            description: "Activité mit à jour avec succès"
            content:
              application/json:
                schema:
                  type: object
                  properties :
                    msg : {type : string ,example : "Activité mit à jour avec succès"}
  /admin/activites/add:
      post:
        summary: "Ajoute une réservation à une activité"
        tags:
        - Réservations & Attente
        requestBody:
            required: true
            content:
              application/json:
                schema:   
                    type: object                 
                    properties :
                      id_famille : {type : integer ,example : 4}
                      id_activite : {type : integer ,example : 4}
                      nb_membre : {type : integer ,example : 4}
        responses:
          '200':
            description: "Réservation ajoutée avec succès"
            content:
              application/json:
                schema:
                  type: object
                  properties :
                    status : {type : string,example : success}
                    msg : {type : string ,example : Reservation AJOUTE}

  /admin/activites/withAnimateur/{id_equip_tech} :
    get:
      summary: "Récupère les activités associés à l'id d'un animateur"
      parameters :
        - name : id_equip_tech
          in : path
          required: true
          description: "L'ID de l'animateur"
          schema:
            type: integer
      responses:
        '200':
          description: "Donnée récupéré avec succès"
          content:
            application/json:
              schema:
                type: object
                properties:
                    prix : {type : integer ,example : 22}
                    date_d : {type : string ,example : "2026-04-14 00:00:00"}
                    date_f : {type : string ,example : "2026-04-15 00:00:00"}
                    id : {type : integer ,example : 6}
                    nom : {type : string ,example : "Barbecue"}
                    cap_act : {type: integer, example: 26}
                    description : {type : string ,example : "le barbecue c'est fun" }
                    lieu : {type: string, example: "ici"}
                    id_animateur : {type : integer ,example : 2 }

        '400':
            description: "Echec de la récupération"
            content : 
              application/json:
                schema:
                  $ref: '#/components/schemas/Error'


  /admin/activites/{id_activite}:
      get:
        summary: "Récupère l'activité selon son id"
        tags:
          - Activités
        parameters:
          - name: id_activite
            in: path
            required: true
            schema:
              type: integer
        responses:
          '200':
            description: "Activité récupéré avec succès"
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    prix : {type : integer ,example : 22}
                    date_d : {type : string ,example : "2026-04-14 00:00:00"}
                    date_f : {type : string ,example : "2026-04-15 00:00:00"}
                    nom : {type : string ,example : "Barbecue"}
                    cap_act : {type : integer ,example : 18}
                    description : {type: string, example: "le barbecue c'est fun"}
                    lieu : {type : string ,example : "ici" }
  /admin/activites:
    get:
      summary: "Récupération de toute les activites"
      tags:
        - Activités
      security:
        - bearerAuth: []
      responses:
        '200':
          description: "Activités récupérés avec succès"
          content:
            application/json:
              schema:
                type: object
                properties:
                    prix : {type : integer ,example : 4}
                    date_d : {type : string ,example : "2026-04-03 08:17:40"}
                    date_f : {type : string ,example : "2026-04-03 10:17:40"}
                    id : {type : integer ,example : 3}
                    nom : {type : string ,example : "Paintball"}
                    cap_act : {type: integer, example: "18"}
                    description : {type : string ,example : "Venez vous faire allumer au paintball"}
                    lieu : {type : string ,example : "lac d'Aiguebelette"}

#/admin/emplacement

  /admin/emplacements/reservations/add :
    post:
        summary: "Ajoute une réservation sur un eemplacement"
        tags:
        - Réservations & Attente
        requestBody:
            required: true
            content:
              application/json:
                schema:   
                    type: object                 
                    properties :
                      id_famille : {type : integer ,example : 73}
                      num_emplacement : {type : integer ,example : 14}
                      date_debut : {type : string ,example : "2026-04-14 00:00:00"}
                      date_fin : {type : string ,example : "2026-04-30 00:00:00"}
        responses:
          '200':
            description: "Réservation ajoutée avec succès"
            content:
              application/json:
                schema:
                  type: object
                  properties :
                    status : {type : string,example : success}
                    msg : {type : string ,example : Inscription reservation emplacement success}
                    calendrier : {type : string, example : null}

  /admin/emplacements/reservations/delete/{id_reservation}:
    delete:
      summary: "Supprime une réservation selon son id"
      tags:
        - Emplacements
      parameters:
          - name: id_reservation
            in: path
            required: true
            schema:
              type: integer
      responses:
          '200':
            description: "Réservation supprimée avec succès"
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Success'
          '400':
            description: "Erreur lors de la suppression"
            content : 
              application/json:
                schema:
                  $ref: '#/components/schemas/Error'
  /admin/emplacements/mois/{mois}:
    get:
      summary: "Récupère le planning d'occupation de tous les emplacements pour un mois donné"
      description: "Retourne la liste complète des emplacements avec, pour chacun, le détail des réservations sur le mois spécifié."
      tags:
        - Emplacements
      parameters:
        - name: mois
          in: path
          required: true
          description: "Le mois au format YYYY-MM (ex: 2026-04)"
          schema:
            type: string
            example: "2026-04"
      responses:
        '200':
          description: "Planning récupéré avec succès"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    num_emplacement: { type: integer, example: 1 }
                    capacite: { type: integer, example: 4 }
                    prix: { type: integer, example: 45 }
                    nom: { type: string, example: "Neptune" }
                    reservations:
                      type: array
                      
  /admin/emplacements:
    get:
      summary: "Récupération de tous les emplacements"
      tags:
        - Emplacements
      security:
        - bearerAuth: []
      responses:
        '200':
          description: "Emplacements récupérés avec succès"
          content:
            application/json:
              schema:
                type: object
                properties:
                    num_emplacement : {type : integer ,example : 4}
                    capacite : {type : integer ,example : 8}
                    prix : {type : integer ,example : 40}
