# LOGIN
 
  /login/connected:
      post:
        summary: Connecte à la session famille
        tags:
        - Authentification
        requestBody:
            required: true
            content:
              application/json:
                schema:     
                    type: object               
                    properties :
                      mail_saisi : {type : string ,example : maelgaborit1407@gmail.com }
                      password_saisi : {type : integer ,example : mdp}
        responses:
          '200':
            description: "Connexion réussie"
            content:
              application/json:
                schema:
                  type: object
                  properties :
                    status : {type : string ,example : connected}
                    msg : {type : string ,example : "Connecté avec success" }


  /login/disconnected:
      get:
        summary: Deconnecte Session
        tags:
        - Authentification
        responses:
          '200':
            description: "Déconnexion réussie"
            content:
              application/json:
                schema:
                  type: object
                  properties :
                    status : {type : string ,example : disconnected}
                    msg : {type : string ,example : Déconnecter avec success}



  /login/isConnected:
      get:
        summary: Verifie Connection Session et renvoit id si connecter
        tags:
        - Authentification 
  
        responses:
          '200':
            description: "Statut de session récupéré"
            content:
              application/json:
                schema:
                  type: object
                  properties :
                    status : {type : string ,example : Connected }
                    role : {type : string ,example : Famille }
                    id: {type : integer ,example : 66}







# 2. Modèles de données réutilisables (La partie "Belle Doc")
components:
  securitySchemes:
    bearerAuth:            # Pour ajouter le bouton "Authorize" (cadenas)
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Activites:
      type: object
      properties:
        prix:
          type: integer
          example : 50
        nom :
          type : string
          example : AquaSplash
        cap_act :
          type : integer
          example : 24
        description:
          type: string
          example : description de l'activité
        id:
          type : integer
          example : 1
        lieu:
          type : string
          example : Arêches
        date_d:
          type : string
          example: "2026-04-02 09:12:44"
        date_f:
          type: string
          example : "2026-04-02 09:12:44"
    Familles:
      properties:
        id_famille:
          type : string
          example : 66
