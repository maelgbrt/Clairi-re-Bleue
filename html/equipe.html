<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style_activites.css">
    <link rel="stylesheet" href="../css/equipes.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script defer src="js/app_equi_act.js"></script>

    <title>Activites</title>
</head>
<body id="app">
         <nav>
            <div id="link">
                <a href="../index.html">HOME</a>
                <a href="#">ACTIVITES</a>
                <a href="contact.html">CONTACT</a>
                <a href="a_propos.html">A PROPOS</a>
            </div>
            <a id="logo-identification"  href="../html/utilisateur.html"><img src="../images/connexion.png" alt="" id="logo-id-img"></a>
        </nav>

        <div id="equipe-page">


            <div id="left">
                <div id="planning">
                    <div v-for="act in activites"  class="activites">
                        <p>{{act.nom}}</p>
                        <button @click="modif(act)">Modifier</button>
                        <button @click="">Supprimer</button>
                    </div>
                </div>
                <div id="activiteCRUD">
                    les activites
                </div>
            </div>
            <div id="right">
                <h1>
                    {{ form_choice == 'creation' ? 'Création' : 'Modification' }}
                </h1>
                <form @submit.prevent="form_choice == 'creation' ? creation_activites() : update_activites()">
                    <p>Nom de l'activité : </p>
                    <input required type="text" v-model="activite.nom" placeholder="">
                    <p>Prix : </p>
                    <input required type="number" v-model="activite.prix" placeholder="">
                    <p>Description : </p>
                    <textarea v-model="activite.description" name="" id=""></textarea>
                    <p>Date Début : </p>
                    <input required type="date" v-model="activite.date_d">
                    <p>Date Fin : </p>
                    <input required type="date" v-model="activite.date_f">
                    <p>Lieu : </p>
                    <input required type="text" v-model="activite.lieu">
                    <p>Capacité : </p>
                    <input required type="number" v-model="activite.cap_act"> 
                    <button type="submit">Enregistrer</button>
                    <p>{{reponse}}</p>
                </form>
                
            </div>
        </div>
</body>
</html>
